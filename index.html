<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>贪吃蛇 · Snake Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>🐍 SNAKE</h1>

  <div id="scoreboard">
    <div><span>得分 SCORE&nbsp;</span><strong id="score">0</strong></div>
    <div><span>最高分 BEST&nbsp;</span><strong id="high-score">0</strong></div>
  </div>

  <div id="game-container">
    <canvas id="canvas" width="400" height="400"></canvas>

    <div id="overlay">
      <h2 id="overlay-title" class="start-title">SNAKE</h2>
      <p id="overlay-msg">准备好了吗？</p>
      <p id="final-score" class="final-score hidden"></p>
      <button id="start-btn">开始游戏 START</button>
    </div>
  </div>

  <div id="controls">
    ↑ W &nbsp;|&nbsp; ↓ S &nbsp;|&nbsp; ← A &nbsp;|&nbsp; → D &nbsp;·&nbsp; 方向键 / Arrow Keys
  </div>

  <script src="game.js"></script>
</body>
</html>
